<!DOCTYPE html>
<html lang=zh-CN>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<title>Test Reports</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f7fa;--card-bg:#fff;--border:#e4e7ed;--text:#303133;--text2:#606266;--text3:#909399;--primary:#409eff;--success:#67c23a;--danger:#f56c6c;--warn:#e6a23c;--info:#909399}
html,body{height:100%}
body{font-family:'Microsoft YaHei','PingFang SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
.header{display:flex;align-items:center;padding:0 20px;background:var(--card-bg);border-bottom:1px solid var(--border);height:50px;gap:12px;flex-shrink:0}
.header h1{font-size:16px;font-weight:600;margin:0}
.header .count{font-size:12px;color:var(--text3);background:#f4f4f5;padding:0 8px;border-radius:4px;height:24px;line-height:24px}
.main{display:flex;flex:1;overflow:hidden}
/* ── 侧栏 ── */
.sidebar{width:280px;min-width:280px;overflow-y:auto;border-right:1px solid var(--border);background:var(--card-bg)}
.sidebar .grp{margin:0}
.sidebar .grp-title{padding:8px 16px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:1px solid #f2f3f5;user-select:none;position:sticky;top:0;background:var(--card-bg);z-index:1}
.sidebar .grp-title:hover{color:var(--primary)}
.sidebar .grp-title .arrow{font-size:10px;transition:transform .15s}
.sidebar .grp-title .arrow.cd{transform:rotate(-90deg)}
.sidebar .grp-title .cnt{font-size:11px;color:var(--text3);margin-left:auto}
.sidebar .item{padding:6px 12px 6px 28px;font-size:13px;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap;color:var(--text2)}
.sidebar .item:hover{background:#f5f7fa}
.sidebar .item.act{background:#ecf5ff;color:var(--primary);border-left-color:var(--primary);font-weight:500}
.sidebar .item .tag{display:inline-block;font-size:10px;padding:0 6px;border-radius:3px;line-height:20px;height:20px}
.sidebar .item .tag.ok{background:#f0f9eb;color:var(--success)}.sidebar .item .tag.fail{background:#fef0f0;color:var(--danger)}.sidebar .item .tag.skip{background:#f0f9eb;color:var(--warn)}
.sidebar .item .nm{flex:1;min-width:0;line-height:22px}.sidebar .item .tm{font-size:10px;color:var(--text3);line-height:22px}
.sidebar .item .del{font-size:12px;color:var(--text3);cursor:pointer;line-height:22px;opacity:0}
.sidebar .item:hover .del{opacity:1}.sidebar .item .del:hover{color:var(--danger)}
.sidebar .sf{width:100%;margin-top:2px}
.sidebar .sf-item{font-size:12px;color:var(--primary);cursor:pointer;padding:2px 6px;display:flex;align-items:center;gap:4px;border-radius:3px}
.sidebar .sf-item:hover{background:#ecf5ff}
.sidebar .sf-item.sf-act{background:#52c41a!important;color:#fff!important;font-weight:700;border-radius:4px;margin:2px 8px!important;padding:3px 8px!important}
.sidebar .sf-item .rm{color:var(--text3);cursor:pointer;margin-left:auto;font-size:11px}
.sidebar .sf-item .rm:hover{color:var(--danger)}
/* ── 内容 ── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px 20px}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px}
.stats{display:flex;gap:8px;margin-bottom:8px;align-items:stretch}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:6px 10px;text-align:center;flex:1;min-width:0}
.card .n{font-size:18px;font-weight:700;line-height:1.2}.card .l{font-size:11px;color:var(--text3);margin-top:1px}
.card.pri .n{color:var(--primary)}.card.suc .n{color:var(--success)}.card.dan .n{color:var(--danger)}.card.war .n{color:var(--warn)}.card.inf .n{color:var(--info)}
.info{font-size:12px;color:var(--text3);text-align:right;margin-bottom:8px}
.flt-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.flt-bar .btn{display:inline-flex;align-items:center;gap:4px;height:28px;padding:0 12px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text2);cursor:pointer;white-space:nowrap}
.flt-bar .btn:hover{border-color:var(--primary);color:var(--primary)}
.flt-bar .btn.pri{background:var(--primary);color:#fff;border-color:var(--primary)}
.flt-bar .btn-add{display:inline-flex;align-items:center;gap:4px;height:28px;padding:0 12px;font-size:12px;border:1px dashed var(--border);border-radius:4px;background:var(--card-bg);color:var(--text2);cursor:pointer;margin-top:4px}
.flt-bar .btn-add:hover{border-color:var(--primary);color:var(--primary);border-style:solid}
.flt-bar .btn.pri:hover{background:#337ecc;border-color:#337ecc}
.flt-panel{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:10px;display:none;width:100%}
.tag.dis{background:#f4f4f5;color:#909399}
.flt-panel.show{display:block}
.flt-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.flt-row select,.flt-row input{height:28px;border:1px solid var(--border);border-radius:4px;padding:0 8px;font-size:12px;color:var(--text);outline:none;background:var(--card-bg)}
.flt-row select:hover,.flt-row input:hover,.flt-row select:focus,.flt-row input:focus{border-color:var(--primary)}
.flt-row .val-sel{width:38px;padding:0 2px;font-size:10px;height:28px;border:1px solid var(--border);border-radius:4px;color:var(--text2);background:var(--card-bg);cursor:pointer}
.flt-row .val-sel:hover{border-color:var(--primary)}
.flt-row input{width:100px}.flt-row .rm{color:var(--text3);cursor:pointer;font-size:14px}.flt-row .rm:hover{color:var(--danger)}
.mode-group{display:flex;gap:0;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.mode-group .md{font-size:12px;padding:4px 10px;cursor:pointer;background:var(--card-bg);color:var(--text2)}
.mode-group .md.act{background:var(--primary);color:#fff;border-color:var(--primary)}
.mode-group .md+.md{border-left:1px solid var(--border)}
/* ── 表格 ── */
.tbl-wrap{flex:1;overflow:auto;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);min-height:0}
.tbl-wrap table{table-layout:auto;border-collapse:collapse;font-size:13px}
.tbl-wrap th{position:sticky;top:0;background:#f5f7fa;color:var(--text2);font-weight:600;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);border-right:1px solid var(--border);z-index:1;white-space:nowrap;user-select:none;cursor:pointer}
.tbl-wrap th:hover{color:var(--primary)}
.tbl-wrap th .sort{font-size:10px;color:var(--text3);margin-left:4px}
.tbl-wrap td{padding:6px 10px;border-bottom:1px solid #ebeef5;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:top}
.cell-long{color:var(--primary);cursor:pointer;border-bottom:1px dashed var(--primary)}
.cell-long:hover{background:#ecf5ff}
.cp-btn{cursor:pointer;font-size:12px;margin-left:4px;opacity:.5;user-select:none}
.cp-btn:hover{opacity:1}
.ss-img{max-width:160px;max-height:120px;border:1px solid #e4e7ed;border-radius:4px;cursor:pointer}
.ss-img:hover{border-color:#409eff}
.tbl-wrap tr:hover td{background:#f5f7fa}
.tbl-wrap tr:last-child td{border-bottom:none}
</style>
</head>

function renderRows(){
  var d=DATA[cur];if(!d){return;}
  var rows=d.results.slice(); // 拷贝
  // 筛选
  if(conds.some(function(c){return c.v;})){
    rows=rows.filter(function(r){
      var rs=[];
      conds.forEach(function(c){
        if(!c.v)return;
        var v=colVal(r,c.c);
        rs.push(match(v,c.o,c.v));
      });
      if(!rs.length)return true;
      return logic==='and'?rs.every(function(v){return v;}):rs.some(function(v){return v;});
    });
  }
  // 排序
  if(sCol>=0){
    var sc=sCol,sa=sAsc;
    rows.sort(function(a,b){
      var va=colVal(a,sc);
      var vb=colVal(b,sc);
      var na=parseFloat(va),nb=parseFloat(vb);
      if(!isNaN(na)&&!isNaN(nb))return sa?na-nb:nb-na;
      return sa?va.localeCompare(vb):vb.localeCompare(va);
    });
  }
  var h='',ri=0;
  rows.forEach(function(r){
    ri++;
    var st=r.st||'';
    var status=st==='PASSED'?'✅ 通过':(st==='SKIPPED'?'⏭ 跳过':(st==='DISABLED'?'🔒 禁用':'❌ 失败'));
    var cls=st==='PASSED'?'ok':(st==='SKIPPED'?'skip':(st==='DISABLED'?'dis':'fail'));
    h+='<tr>';
    H.forEach(function(hd,i){
      var cn=H[i];
      if(cn==='#')h+='<td style=color:#909399;font-size:11px;text-align:center>'+ri+'</td>';
      else if(cn==='状态')h+='<td title="'+status+'"><span class=tag '+cls+'>'+status+'</span></td>';
      else if(cn==='套件')h+='<td title="'+esc(r.s)+'">'+esc(r.s)+'</td>';
      else if(cn==='用例')h+='<td title="'+esc(r.c)+'">'+esc(r.c)+'</td>';
      else if(cn==='耗时(ms)')h+='<td title="'+r.d.toFixed(1)+' ms">'+r.d.toFixed(1)+'</td>';
      else if(cn==='导入模型'){
        var src=r.si||'';
        h+='<td>'+(src?'<img src="'+esc(src)+'" class=ss-img onclick="viewImage(this)" title="\u5355\u51fb\u653e\u5927\u67e5\u770b">':'')+'</td>';}
      else if(cn==='导出模型'){
        var src=r.se||'';
        h+='<td>'+(src?'<img src="'+esc(src)+'" class=ss-img onclick="viewImage(this)" title="\u5355\u51fb\u653e\u5927\u67e5\u770b">':'')+'</td>';}
      else {
        var raw=r.p[cn]||'';
        if(raw.length>200){
          h+='<td title="'+esc(raw)+'"><span class=cell-long data-full="'+esc(raw)+'">'+esc(raw.slice(0,200))+'…</span><span class=cp-btn onclick="event.stopPropagation();copyText(this.previousSibling.dataset.full)" title="复制">📋</span></td>';
        }else{
          h+='<td title="'+esc(raw)+'">'+esc(raw)+'</td>';
        }
      }
    });
    h+='</tr>';
  });
  var tb=document.getElementById('tblBody');
  if(tb)tb.innerHTML=h;
}

function match(v,op,p){
  var x=(''+v).toLowerCase().trim(),y=(''+p).toLowerCase().trim();
  if(!y)return 1;
  switch(op){
    case'eq':return x===y;case'ne':return x!==y;
    case'lt':return parseFloat(x)<parseFloat(y);case'gt':return parseFloat(x)>parseFloat(y);
    case'le':return parseFloat(x)<=parseFloat(y);case'ge':return parseFloat(x)>=parseFloat(y);
    case'notin':return x.indexOf(y)<0;
    default:return x.indexOf(y)>=0;
  }
}

function sortBy(i){
  // 拖拽列宽后不触发排序
  if(_rszFlag===i+1){_rszFlag=0;return;}
  _rszFlag=0;
  if(sCol===i){sAsc=!sAsc;}else{sCol=i;sAsc=true;}
  document.querySelectorAll('#tbl th .sort').forEach(function(el){el.textContent='';});
  document.getElementById('sort'+i).textContent=sAsc?' ▲':' ▼';
  renderRows();
}

function colResize(e,i){
  // 已废弃，改用浏览器原生列宽拖拽 + ResizeObserver 保存
}
function setupColDrag(){
  var T=document.getElementById('tbl');if(!T)return;
  // 恢复保存的列宽
  var curData=DATA[cur];
  if(curData){
    try{var cs=JSON.parse(getStore('tr_cols_'+curData.id));if(cs&&cs.w){T.style.tableLayout='fixed';T.querySelectorAll('col').forEach(function(col,i){if(cs.w[i])col.style.width=cs.w[i];});}}catch(e){}
  }
  // 用ResizeObserver监听浏览器原生列宽拖拽，自动保存
  if(window._colResizeObserver) window._colResizeObserver.disconnect();
  var saveTimer;
  window._colResizeObserver = new ResizeObserver(function(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      if(cur>=0&&DATA[cur]){
        var w={};document.querySelectorAll('#tbl col').forEach(function(c,i){w[i]=c.style.width||'';});
        try{var cs=JSON.parse(getStore('tr_cols_'+DATA[cur].id)||'{}');cs.w=w;setStore('tr_cols_'+DATA[cur].id,JSON.stringify(cs));}catch(e){}
      }
    },300);
  });
  T.querySelectorAll('th').forEach(function(th){window._colResizeObserver.observe(th);});
  // 右边缘显示col-resize光标提示，同时临时禁用draggable避免触发布列交换
  T.querySelectorAll('th').forEach(function(th){
    th.addEventListener('mousemove',function(e){
      var nearRight = e.clientX >= this.getBoundingClientRect().right - 4;
      this.style.cursor = nearRight ? 'col-resize' : '';
      if (nearRight) { this._origDraggable = this.draggable; this.draggable = false; }
      else if (this._origDraggable !== undefined) { this.draggable = this._origDraggable; delete this._origDraggable; }
    });
    th.addEventListener('mouseleave',function(){this.style.cursor=''; if(this._origDraggable!==undefined){this.draggable=this._origDraggable;delete this._origDraggable;}});
  });
  // 拖拽列顺序
  var dc=-1;
  T.querySelectorAll('th').forEach(function(th,ci){
    th.draggable=true;
    th.addEventListener('dragstart',function(e){dc=this.cellIndex;this.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    th.addEventListener('dragend',function(){this.classList.remove('dragging');});
    th.addEventListener('dragover',function(e){e.preventDefault();T.querySelectorAll('th').forEach(function(h){h.classList.remove('drop-target');});this.classList.add('drop-target');});
    th.addEventListener('dragleave',function(){this.classList.remove('drop-target');});
    th.addEventListener('drop',function(e){
      e.preventDefault();this.classList.remove('drop-target');
      if(dc<0||dc===this.cellIndex)return;
      reorderCols(dc,this.cellIndex);
      dc=-1;
    });
  });
}
function reorderCols(from,to){
  console.log('reorderCols called:', from, '->', to, 'H before:', H);
  // 更新 H 数组顺序
  var item=H.splice(from,1)[0];
  H.splice(to,0,item);
  console.log('H after:', H);
  // 存列名 + 保留已有的列宽
  if(cur>=0&&DATA[cur]){
    var cs={};
    try{cs=JSON.parse(getStore('tr_cols_'+DATA[cur].id));}catch(e){}
    cs.h=H.slice();
    // 列宽跟随列名一起移动（用数组 splice 保持同步）
    if(cs.w){
      var widthArr=[];
      Object.keys(cs.w).forEach(function(k){widthArr[parseInt(k)]=cs.w[k];});
      var wi=widthArr.splice(from,1)[0];
      widthArr.splice(to,0,wi||'');
      var newW={};
      widthArr.forEach(function(w,idx){newW[idx]=w;});
      cs.w=newW;
    }
    setStore('tr_cols_'+DATA[cur].id,JSON.stringify(cs));
  }
  // 重绘整个表格
  if(cur>=0)render(DATA[cur]);
  // 更新 sidebar 高亮
  buildSidebar();
}

  DATA[cur]._sf.push(sv);
  ssf(DATA[cur].id,DATA[cur]._sf);
  loadedFilter=DATA[cur]._sf.length-1;
  var savedConds=JSON.parse(JSON.stringify(conds)),savedMode=logic;
  buildSidebar();sel(cur);
  conds=savedConds;logic=savedMode;
  renderFltRows();updateFltBtn();renderRows();
  var p=document.getElementById('fltPanel');
  if(p)p.classList.add('show');
}

function ldF(i,fi){
  if(i!==cur)sel(i);
  var sf=DATA[i]._sf[fi];
  if(!sf)return;
  loadedFilter=fi;
  // 更新侧栏激活状态（轻量，不重建）
  document.querySelectorAll('.item').forEach(function(e){e.classList.remove('act');});
  document.querySelectorAll('.sf-item').forEach(function(e){e.classList.remove('sf-act');});
  var item=document.querySelector('.item[data-idx=\"'+i+'\"]');
  if(item){
    item.classList.add('act');
    var sfItems=item.querySelectorAll('.sf-item');
    if(sfItems[fi]) sfItems[fi].classList.add('sf-act');
  }
  conds=sf.conds.map(function(c){var ci=c.c;if(typeof ci==='string'){var idx=H.indexOf(ci);ci=idx>=0?idx:ci;}return{c:ci,o:c.o||'in',v:c.v};});
  logic=sf.mode||'and';
  renderFltRows();updateFltBtn();renderRows();
  document.querySelectorAll('.mode-group .md').forEach(function(e){e.classList.toggle('act',e.dataset.m===logic);});
}

function delSF(i,fi){
  if(!confirm('删除此筛选？'))return;
  DATA[i]._sf.splice(fi,1);
  ssf(DATA[i].id,DATA[i]._sf);
  buildSidebar();
  if(cur>=0)sel(cur);
}

// 辅助：取列名（ci可以是索引或属性名）
function colH(ci){return typeof ci==='number'&&ci>=0&&ci<H.length?H[ci]:ci;}
// 辅助：取某行某列的值
function colVal(r,ci){
  if(typeof ci==='string') return r.p[ci]||'';
  if(ci===0) return '';
  if(ci===1) return r.st==='PASSED'?'✅ 通过':(r.st==='SKIPPED'?'⏭ 跳过':(r.st==='DISABLED'?'🔒 禁用':'❌ 失败'));
  if(ci===2) return r.s;
  if(ci===3) return r.c;
  if(ci===4) return r.d.toFixed(1);
  return r.p[H[ci]]||'';
}
window.sel=sel;window.delRun=delRun;window.ldF=ldF;window.delSF=delSF;
window.toggleGroup=toggleGroup;window.toggleFlt=toggleFlt;window.saveFlt=saveFlt;window.newFlt=newFlt;
window.setMode=setMode;window.addFlt=addFlt;window.rmFlt=rmFlt;
window.updC=updC;window.sortBy=sortBy;window.setupColDrag=setupColDrag;
window.viewImage=viewImage;window.renderRows=renderRows;window.updateFltBtn=updateFltBtn;window.renderFltRows=renderFltRows;window.getColVals=getColVals;window.setupColDrag=setupColDrag;window.buildSidebar=buildSidebar;window.copyText=copyText;
function copyText(t){
  navigator.clipboard.writeText(t).catch(function(){var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});
}
buildSidebar();
})();
</script>
</body>
